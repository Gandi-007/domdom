<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question importante</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #1a1a2e, #000);
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

.container {
    text-align: center;
}

h1 {
    margin-bottom: 40px;
}

.btn {
    padding: 15px 25px;
    margin: 10px;
    font-size: 1.2rem;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

#yes {
    background: linear-gradient(45deg, #ff4dd2, #6a5cff);
    color: white;
}

#no {
    background: #333;
    color: white;
    position: absolute;
}

.hidden {
    display: none;
}

.reveal {
    font-size: 2rem;
    animation: pop 0.8s ease;
}

@keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="container" id="page1">
    <h1>Qui est la plus belle personne du monde ?</h1>

    <button class="btn" id="yes">Certainement pas Domenica 💖</button>
    <button class="btn" id="no"> Domenica</button>
</div>

<div class="container hidden" id="page2">
    <div class="reveal">Bonne réponse 😌<br><br>Bonne Reponse! Les laches sont moches 👀</div>
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const page1 = document.getElementById("page1");
const page2 = document.getElementById("page2");

// bouton qui fuit la souris
document.addEventListener("mousemove", (e) => {
    const rect = noBtn.getBoundingClientRect();

    const dx = e.clientX - (rect.left + rect.width / 2);
    const dy = e.clientY - (rect.top + rect.height / 2);
    const distance = Math.sqrt(dx*dx + dy*dy);

    if (distance < 120) {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }
});

// clic sur Domenica
yesBtn.addEventListener("click", () => {
    page1.classList.add("hidden");
    page2.classList.remove("hidden");
});
</script>

</body>
</html>
